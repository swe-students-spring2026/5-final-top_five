<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Five</title>
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">Top Five</div>
        <ul class="nav-links">
            <li><a href="">Home</a></li>
            <li><a href="">About</a></li>
        </ul>
    </nav>

    <main class="input">
        <form id="upload-form" enctype="multipart/form-data">
            <input type="file" id="file-input" name="file" hidden>
            <div id="drop-zone">
                <p>Drag &amp; drop a file here</p>
                <span>or</span>
                <button type="button" id="upload" onclick="document.getElementById('file-input').click()">
                    Choose File
                </button>
                <p id="file-name">No file chosen</p>
            </div>
        </form>
    </main>

    <script>
        const dropZone = document.getElementById("drop-zone");
        const fileInput = document.getElementById("file-input");
        const fileName = document.getElementById("file-name");

        dropZone.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropZone.classList.add("dragover");
        });

        dropZone.addEventListener("dragleave", () => {
            dropZone.classList.remove("dragover");
        });

        dropZone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropZone.classList.remove("dragover");
            const file = e.dataTransfer.files[0];
            if (file) {
                fileInput.files = e.dataTransfer.files;
                fileName.textContent = file.name;
            }
        });

        fileInput.addEventListener("change", () => {
            fileName.textContent = fileInput.files[0] ? fileInput.files[0].name : "No file chosen";
        });
    </script>

</body>
</html>
